name: Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up exact Node baseline
        uses: actions/setup-node@v6
        with:
          node-version: 22.23.1
          cache: npm

      - name: Verify toolchain
        shell: bash
        run: |
          test "$(node --version)" = "v22.23.1"
          test "$(npm --version)" = "10.9.8"

      - name: Install locked dependencies
        run: npm ci

      - name: Test baseline contracts
        run: npm test

      - name: Install Chromium and system dependencies
        run: npm exec -- playwright install --with-deps chromium

      # Chromium (bundled SwiftShader) is a deterministic software-WebGL
      # rasterizer and is the required CI gate. The Firefox arm of the
      # two-engine matrix stays a documented LOCAL qualification gate: Firefox
      # has no SwiftShader equivalent and cannot create a WebGL context on
      # GPU-less GitHub Actions runners ("Exhausted GL driver options"). See
      # codev/reviews/11-upgrade-and-behaviorally-quali.md
      # ("CI enforcement vs. local qualification").
      - name: Validate
        env:
          E2E_ENGINES: chromium
        run: npm run validate

      - name: Capture full audit evidence
        if: always()
        shell: bash
        run: |
          mkdir -p audit-results/full
          set +e
          npm audit --json > audit-results/full/audit.json
          audit_status=$?
          set -e
          printf '%s\n' "$audit_status" > audit-results/full/exit-code.txt
          node scripts/validate-audit-report.mjs \
            audit-results/full/audit.json "$audit_status"

      - name: Capture production audit evidence
        if: always()
        shell: bash
        run: |
          mkdir -p audit-results/production
          set +e
          npm audit --omit=dev --json > audit-results/production/audit.json
          audit_status=$?
          set -e
          printf '%s\n' "$audit_status" > audit-results/production/exit-code.txt
          node scripts/validate-audit-report.mjs \
            audit-results/production/audit.json "$audit_status"

      - name: Upload full audit evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-full
          path: audit-results/full/
          if-no-files-found: error

      - name: Upload production audit evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-production
          path: audit-results/production/
          if-no-files-found: error

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
