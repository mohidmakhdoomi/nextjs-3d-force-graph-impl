# Experiment 42 — Kaggle GPU spike (MANUAL DISPATCH ONLY).
#
# Approved by the architect (issue #42 decision records, 2026-07-21) as a
# one-off, non-required spike. Guarantees it can never affect the required
# Validation gate or spend Kaggle quota unattended:
#   - Trigger is `workflow_dispatch` ONLY — it never runs on push/PR and is NOT
#     a required status check. No recurring/scheduled trigger (ToS constraint).
#   - The third-party action is PINNED BY COMMIT SHA (audited v2.0.0), not a
#     mutable tag.
#   - The kernel is private (is_private=true); `timeout_seconds` bounds the run
#     so a hung job cannot burn the weekly GPU quota.
#
# Two stages (select with the `stage` input):
#   - probe: Stage-1 WebGL renderer probe (baseline, or run #5 NVIDIA-GL
#     escalation when install_nvidia_gl=true).
#   - e2e:   Stage-2 MEASURED full Chromium e2e suite on the real GPU
#     (kaggle_e2e_runner.py) — the run #5 driver recipe + Node 22.23.1 + npm ci
#     + build + full suite with per-stage timing. Answers the wall-clock question.
#
# Run it:
#   gh workflow run kaggle-gpu-spike.yml -f stage=e2e -f machine_shape=NvidiaTeslaT4
#   gh run watch "$(gh run list --workflow=kaggle-gpu-spike.yml -L1 \
#                   --json databaseId -q '.[0].databaseId')"
# The result JSON + Playwright report are retrieved below and uploaded as an
# artifact; on kernel SUCCESS the action discards its own log.
name: Kaggle GPU Spike (experiment 42 — manual only)

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage: probe (Stage-1 WebGL renderer) or e2e (Stage-2 measured full suite)"
        default: probe
        type: choice
        options: [probe, e2e]
      machine_shape:
        description: Kaggle accelerator shape
        default: NvidiaTeslaT4
        type: choice
        options: [NvidiaTeslaT4, NvidiaTeslaP100]
      install_nvidia_gl:
        description: "probe stage only — apt/runfile-install matching NVIDIA GL userspace before probing (run #5 escalation). Ignored for e2e (always installs)."
        default: 'false'
        type: choice
        options: ['false', 'true']

# No elevated permissions; this job does not write to the repo.
permissions:
  contents: read

jobs:
  kaggle-gpu-spike:
    name: Kaggle GPU spike (${{ inputs.stage }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # The KAGGLE_API_TOKEN secret is write-only and its shape is unknown: it
      # may be a raw access-token string OR legacy JSON {"username","key"}. This
      # step detects which WITHOUT ever echoing the value: it reads the secret
      # from env (never interpolated into the script text), and for the JSON
      # case extracts username/key and immediately `::add-mask::`es them so they
      # are redacted in every subsequent log line. Only a non-secret `mode`
      # (string|json) plus masked outputs leave this step.
      - name: Detect Kaggle credential format (no secret echo)
        id: sniff
        shell: bash
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os
          raw = os.environ.get("KAGGLE_API_TOKEN", "").strip()
          mode, user, key = "string", "", ""
          if raw.startswith("{"):
              try:
                  d = json.loads(raw)
                  if isinstance(d, dict) and d.get("username") and d.get("key"):
                      mode, user, key = "json", str(d["username"]), str(d["key"])
              except Exception:
                  mode = "string"
          # Redact extracted credentials from all later logs BEFORE emitting them.
          if mode == "json":
              print(f"::add-mask::{key}")
              print(f"::add-mask::{user}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"mode={mode}\n")
              f.write(f"username<<__EOF__\n{user}\n__EOF__\n")
              f.write(f"key<<__EOF__\n{key}\n__EOF__\n")
          if not raw:
              raise SystemExit("KAGGLE_API_TOKEN is empty — configure the secret.")
          print(f"Detected credential mode: {mode} (secret contents never shown)")
          PY

      # Resolve which kernel script to upload and how long to allow it.
      #   e2e   -> kaggle_e2e_runner.py            (Stage-2 measured suite)
      #   probe -> kaggle_webgl_probe_nvgl.py      (run #5 escalation, install_nvidia_gl=true)
      #          | kaggle_webgl_probe.py           (baseline)
      # The e2e stage does far more work (driver + Node + npm ci + browser +
      # build + full suite), so it gets a longer kernel timeout.
      - name: Resolve stage parameters
        id: stage
        shell: bash
        run: |
          if [ "${{ inputs.stage }}" = "e2e" ]; then
            echo "code_file=experiments/42_kaggle_gpu_ci/kaggle_e2e_runner.py" >> "$GITHUB_OUTPUT"
            echo "timeout_seconds=3000" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.install_nvidia_gl }}" = "true" ]; then
            echo "code_file=experiments/42_kaggle_gpu_ci/kaggle_webgl_probe_nvgl.py" >> "$GITHUB_OUTPUT"
            echo "timeout_seconds=1200" >> "$GITHUB_OUTPUT"
          else
            echo "code_file=experiments/42_kaggle_gpu_ci/kaggle_webgl_probe.py" >> "$GITHUB_OUTPUT"
            echo "timeout_seconds=1200" >> "$GITHUB_OUTPUT"
          fi
          echo "dispatch_started=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"

      # --- Access-token-string credential path ---
      # continue-on-error: the action's own status/log-dump step crashes on this
      # kernel's log format (ConvertFrom-Json "Additional text encountered") and
      # never prints the kernel stdout — a real reporting defect. We let the job
      # proceed to the retrieval/verdict steps below, which read the actual
      # result artifact and set the true job status.
      - name: Run Kaggle GPU kernel (api_token)
        if: steps.sniff.outputs.mode == 'string'
        continue-on-error: true
        # Frederisk/kaggle-action@v2.0.0 pinned by SHA (audited 2026-07-21).
        uses: Frederisk/kaggle-action@e6bafb6bf66da87116cca560a7636422213cf354
        with:
          api_token: ${{ secrets.KAGGLE_API_TOKEN }}
          title: nextjs3dfg-webgl-probe
          code_file: ${{ steps.stage.outputs.code_file }}
          language: python
          kernel_type: script
          is_private: 'true'
          enable_gpu: 'true'
          enable_internet: 'true'
          machine_shape: ${{ inputs.machine_shape }}
          timeout_seconds: ${{ steps.stage.outputs.timeout_seconds }}

      # --- Legacy username/key credential path ---
      - name: Run Kaggle GPU kernel (username/key)
        if: steps.sniff.outputs.mode == 'json'
        continue-on-error: true
        uses: Frederisk/kaggle-action@e6bafb6bf66da87116cca560a7636422213cf354
        with:
          username: ${{ steps.sniff.outputs.username }}
          key: ${{ steps.sniff.outputs.key }}
          title: nextjs3dfg-webgl-probe
          code_file: ${{ steps.stage.outputs.code_file }}
          language: python
          kernel_type: script
          is_private: 'true'
          enable_gpu: 'true'
          enable_internet: 'true'
          machine_shape: ${{ inputs.machine_shape }}
          timeout_seconds: ${{ steps.stage.outputs.timeout_seconds }}

      # The kaggle CLI + ~/.kaggle credentials were set up by the action above and
      # persist on the runner. By the time the action returns (even on its crash),
      # the kernel is in a TERMINAL state, so its output is fetchable. This is the
      # real evidence channel — it bypasses the action's broken stdout dump.
      - name: Retrieve Kaggle kernel output (robust)
        if: always()
        shell: bash
        run: |
          OWNER=mohidmakhdoomi   # kernel owner for this token (confirmed via push URL)
          SLUG=nextjs3dfg-webgl-probe
          kaggle kernels output "$OWNER/$SLUG" -p kernel-output || true
          echo "=== retrieved files ==="; ls -la kernel-output || true
          for f in webgl_probe_result.json e2e_result.json; do
            if [ -f "kernel-output/$f" ]; then
              echo "=== $f (structured verdict) ==="
              cat "kernel-output/$f"; echo
            fi
          done
          echo "=== reconstructed kernel stdout ==="
          if [ -f "kernel-output/$SLUG.log" ]; then
            jq -r '.[].data' "kernel-output/$SLUG.log" 2>/dev/null \
              || python3 -c "import json,sys;print(''.join(x.get('data','') for x in json.load(open(sys.argv[1]))))" "kernel-output/$SLUG.log" 2>/dev/null \
              || cat "kernel-output/$SLUG.log"
          fi

      # Make the result JSON + Playwright report downloadable from the run page.
      - name: Upload kernel output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-${{ inputs.stage }}-output
          path: kernel-output
          if-no-files-found: warn

      - name: Verdict (job status reflects the actual result)
        if: always()
        shell: bash
        run: |
          if [ "${{ inputs.stage }}" = "e2e" ]; then
            f=kernel-output/e2e_result.json
            if [ ! -f "$f" ]; then
              echo "::warning::No e2e_result.json — kernel crashed before writing it; inspect stdout above."
              exit 1
            fi
            verdict="$(python3 -c "import json;print(json.load(open('$f')).get('verdict'))")"
            renderer="$(python3 -c "import json;d=json.load(open('$f'));print(d.get('renderer'),'/',d.get('renderer_class'))")"
            timings="$(python3 -c "import json;d=json.load(open('$f'));print('stages',d.get('stage_timings_sec'),'total_sec',d.get('total_sec'),'suite',d.get('suite'))")"
            echo "Stage-2 e2e verdict: $verdict"
            echo "renderer: $renderer"
            echo "kernel timing: $timings"
            # Job PASSES only if the FULL suite passed on confirmed hardware WebGL.
            test "$verdict" = "pass_on_hardware"
          else
            f=kernel-output/webgl_probe_result.json
            if [ ! -f "$f" ]; then
              echo "::warning::No result artifact — kernel crashed before writing it; inspect stdout above."
              exit 1
            fi
            verdict="$(python3 -c "import json;print(json.load(open('$f'))['verdict'])")"
            flagset="$(python3 -c "import json;d=json.load(open('$f'));print(d.get('hardware_flag_set') or 'none')")"
            echo "Kaggle GPU WebGL verdict: $verdict (hardware flag set: $flagset)"
            test "$verdict" = "hardware"
          fi
