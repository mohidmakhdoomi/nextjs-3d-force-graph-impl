# Experiment 42 — Kaggle GPU WebGL probe (MANUAL DISPATCH ONLY).
#
# Approved by the architect (issue #42 decision record, 2026-07-21) as a
# one-off, non-required spike. Guarantees it can never affect the required
# Validation gate or spend Kaggle quota unattended:
#   - Trigger is `workflow_dispatch` ONLY — it never runs on push/PR and is NOT
#     a required status check. No recurring/scheduled trigger (ToS constraint).
#   - The third-party action is PINNED BY COMMIT SHA (audited v2.0.0), not a
#     mutable tag.
#   - The kernel is private (is_private=true); `timeout_seconds` bounds the run
#     so a hung probe cannot burn the weekly GPU quota.
#
# Run it:
#   gh workflow run kaggle-gpu-spike.yml -f machine_shape=NvidiaTeslaT4
#   gh run watch "$(gh run list --workflow=kaggle-gpu-spike.yml -L1 \
#                   --json databaseId -q '.[0].databaseId')"
# On kernel SUCCESS the action discards the log; retrieve it directly:
#   kaggle kernels output <username>/nextjs3dfg-webgl-probe
name: Kaggle GPU Spike (experiment 42 — manual only)

on:
  workflow_dispatch:
    inputs:
      machine_shape:
        description: Kaggle accelerator shape
        default: NvidiaTeslaT4
        type: choice
        options: [NvidiaTeslaT4, NvidiaTeslaP100]

# No elevated permissions; this job does not write to the repo.
permissions:
  contents: read

jobs:
  kaggle-webgl-probe:
    name: Kaggle GPU WebGL probe (Stage 1)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # The KAGGLE_API_TOKEN secret is write-only and its shape is unknown: it
      # may be a raw access-token string OR legacy JSON {"username","key"}. This
      # step detects which WITHOUT ever echoing the value: it reads the secret
      # from env (never interpolated into the script text), and for the JSON
      # case extracts username/key and immediately `::add-mask::`es them so they
      # are redacted in every subsequent log line. Only a non-secret `mode`
      # (string|json) plus masked outputs leave this step.
      - name: Detect Kaggle credential format (no secret echo)
        id: sniff
        shell: bash
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os
          raw = os.environ.get("KAGGLE_API_TOKEN", "").strip()
          mode, user, key = "string", "", ""
          if raw.startswith("{"):
              try:
                  d = json.loads(raw)
                  if isinstance(d, dict) and d.get("username") and d.get("key"):
                      mode, user, key = "json", str(d["username"]), str(d["key"])
              except Exception:
                  mode = "string"
          # Redact extracted credentials from all later logs BEFORE emitting them.
          if mode == "json":
              print(f"::add-mask::{key}")
              print(f"::add-mask::{user}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"mode={mode}\n")
              f.write(f"username<<__EOF__\n{user}\n__EOF__\n")
              f.write(f"key<<__EOF__\n{key}\n__EOF__\n")
          if not raw:
              raise SystemExit("KAGGLE_API_TOKEN is empty — configure the secret.")
          print(f"Detected credential mode: {mode} (secret contents never shown)")
          PY

      # --- Access-token-string credential path ---
      # continue-on-error: the action's own status/log-dump step crashes on this
      # kernel's log format (ConvertFrom-Json "Additional text encountered") and
      # never prints the kernel stdout — a real reporting defect. We let the job
      # proceed to the retrieval/verdict steps below, which read the actual
      # result artifact and set the true job status.
      - name: Run WebGL probe on Kaggle GPU kernel (api_token)
        if: steps.sniff.outputs.mode == 'string'
        continue-on-error: true
        # Frederisk/kaggle-action@v2.0.0 pinned by SHA (audited 2026-07-21).
        uses: Frederisk/kaggle-action@e6bafb6bf66da87116cca560a7636422213cf354
        with:
          api_token: ${{ secrets.KAGGLE_API_TOKEN }}
          title: nextjs3dfg-webgl-probe
          code_file: experiments/42_kaggle_gpu_ci/kaggle_webgl_probe.py
          language: python
          kernel_type: script
          is_private: 'true'
          enable_gpu: 'true'
          enable_internet: 'true'
          machine_shape: ${{ inputs.machine_shape }}
          timeout_seconds: '1200'

      # --- Legacy username/key credential path ---
      - name: Run WebGL probe on Kaggle GPU kernel (username/key)
        if: steps.sniff.outputs.mode == 'json'
        continue-on-error: true
        uses: Frederisk/kaggle-action@e6bafb6bf66da87116cca560a7636422213cf354
        with:
          username: ${{ steps.sniff.outputs.username }}
          key: ${{ steps.sniff.outputs.key }}
          title: nextjs3dfg-webgl-probe
          code_file: experiments/42_kaggle_gpu_ci/kaggle_webgl_probe.py
          language: python
          kernel_type: script
          is_private: 'true'
          enable_gpu: 'true'
          enable_internet: 'true'
          machine_shape: ${{ inputs.machine_shape }}
          timeout_seconds: '1200'

      # The kaggle CLI + ~/.kaggle credentials were set up by the action above and
      # persist on the runner. By the time the action returns (even on its crash),
      # the kernel is in a TERMINAL state, so its output is fetchable. This is the
      # real evidence channel — it bypasses the action's broken stdout dump.
      - name: Retrieve Kaggle kernel output (robust)
        if: always()
        shell: bash
        run: |
          OWNER=mohidmakhdoomi   # kernel owner for this token (confirmed via push URL)
          SLUG=nextjs3dfg-webgl-probe
          kaggle kernels output "$OWNER/$SLUG" -p kernel-output || true
          echo "=== retrieved files ==="; ls -la kernel-output || true
          echo "=== webgl_probe_result.json (structured verdict) ==="
          cat "kernel-output/webgl_probe_result.json" 2>/dev/null || echo "(no result artifact — kernel may have crashed before writing it)"
          echo "=== reconstructed kernel stdout ==="
          if [ -f "kernel-output/$SLUG.log" ]; then
            jq -r '.[].data' "kernel-output/$SLUG.log" 2>/dev/null \
              || python3 -c "import json,sys;print(''.join(x.get('data','') for x in json.load(open(sys.argv[1]))))" "kernel-output/$SLUG.log" 2>/dev/null \
              || cat "kernel-output/$SLUG.log"
          fi

      - name: Verdict (job status reflects the actual WebGL result)
        if: always()
        shell: bash
        run: |
          f=kernel-output/webgl_probe_result.json
          if [ ! -f "$f" ]; then
            echo "::warning::No result artifact — kernel crashed before writing it; inspect stdout above."
            exit 1
          fi
          verdict="$(python3 -c "import json;print(json.load(open('$f'))['verdict'])")"
          flagset="$(python3 -c "import json;d=json.load(open('$f'));print(d.get('hardware_flag_set') or 'none')")"
          echo "Kaggle GPU WebGL verdict: $verdict (hardware flag set: $flagset)"
          # Job PASSES only if a real hardware renderer was obtained.
          test "$verdict" = "hardware"
